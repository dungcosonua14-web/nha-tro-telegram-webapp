<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nhà Trọ Eden</title>
    <meta name="description" content="Quản lý nhà trọ Eden qua Telegram">

    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">

        <!-- Loading screen -->
        <div id="loadingScreen" class="screen active">
            <div class="loading-content">
                <div class="loading-logo">🏠</div>
                <div class="loading-spinner"></div>
                <p class="loading-text">Đang kết nối...</p>
            </div>
        </div>

        <!-- Main App -->
        <div id="mainScreen" class="screen">

            <!-- Header -->
            <header class="app-header">
                <div class="header-brand">
                    <div class="header-icon-wrap">🏠</div>
                    <div>
                        <div class="header-title">Nhà Trọ Eden</div>
                        <div class="header-subtitle" id="headerSubtitle">Đang tải...</div>
                    </div>
                </div>
                <div class="header-user" id="headerUser"></div>
            </header>

            <!-- Tab Content -->
            <div class="tab-content" id="tabContent">
                <!-- Rendered by JS -->
            </div>

            <!-- Bottom Nav -->
            <nav class="bottom-nav">
                <button class="nav-btn active" data-tab="dashboard" onclick="App.switchTab('dashboard')">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Tổng quan</span>
                </button>
                <button class="nav-btn" data-tab="rooms" onclick="App.switchTab('rooms')">
                    <i data-lucide="door-open"></i>
                    <span>Phòng</span>
                </button>
                <button class="nav-btn" data-tab="tenants" onclick="App.switchTab('tenants')">
                    <i data-lucide="users"></i>
                    <span>Người thuê</span>
                </button>
                <button class="nav-btn" data-tab="invoices" onclick="App.switchTab('invoices')">
                    <i data-lucide="receipt"></i>
                    <span>Hóa đơn</span>
                </button>
            </nav>
        </div>

        <!-- Access Denied screen -->
        <div id="deniedScreen" class="screen">
            <div class="denied-wrap">
                <div class="denied-icon">🔒</div>
                <h2 id="deniedTitle">Truy cập bị từ chối</h2>
                <p id="deniedMessage">Web App này chỉ dành cho người được chủ trọ cấp quyền.</p>
                <div class="denied-id-box" id="deniedIdBox">
                    <div class="denied-id-label">Telegram ID của bạn</div>
                    <div class="denied-id-value" id="deniedUserId">—</div>
                    <div class="denied-id-name" id="deniedUserName">—</div>
                </div>
                <p class="denied-hint">📩 Gửi ID này cho chủ trọ để được thêm quyền qua lệnh <code>/adduser</code> trên
                    bot.</p>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>

</html>
